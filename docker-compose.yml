services:
  postgres:
    image: postgres:16-alpine
    container_name: rent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rent
      POSTGRES_PASSWORD: rent
      POSTGRES_DB: rentmonitoring
    ports:
      - "5432:5432"
    volumes:
      - rent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rent -d rentmonitoring"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  rent_pgdata:
